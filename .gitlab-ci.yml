stages:
  - prepare
  - build
  - test

variables:
  GIT_STRATEGY: fetch
  GIT_SUBMODULE_STRATEGY: recursive
  FILAMENT_VERSION: "1.71.0"

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"

# ----- Templates -----

.build-template:
  stage: build
  script:
    - cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
    - cmake --build build
  artifacts:
    paths:
      - build/
    expire_in: 1 day

.test-template:
  stage: test
  script:
    - ctest --test-dir build --output-on-failure --output-junit Test.xml
  artifacts:
    reports:
      junit: Test.xml

# ----- Material compilation (host matc required) -----

compile:materials:
  stage: prepare
  tags:
    - macos
    - arm64
  script:
    - cmake -B build-matc -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF
    - |
      for mat in src/materials/*.mat; do
        name=$(basename "$mat" .mat)
        external/filament/bin/matc -a all -o "src/materials/${name}.filamat" "$mat"
        echo "Compiled: ${name}"
      done
  artifacts:
    paths:
      - src/materials/*.filamat
    expire_in: 1 day
  cache:
    key: filament-macos-arm64-${FILAMENT_VERSION}
    paths:
      - external/filament/

# ----- Windows x86_64 (MSVC) -----

build:windows:
  extends: .build-template
  tags:
    - windows
  script:
    - '. .\scripts\vcvarsall.ps1'
    - cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
    - cmake --build build
  cache:
    key: filament-windows-${FILAMENT_VERSION}
    paths:
      - external/filament/

test:windows:
  extends: .test-template
  tags:
    - windows
  needs: ["build:windows"]

# ----- macOS arm64 -----

build:macos-arm64:
  extends: .build-template
  tags:
    - macos
    - arm64
  cache:
    key: filament-macos-arm64-${FILAMENT_VERSION}
    paths:
      - external/filament/

test:macos-arm64:
  extends: .test-template
  tags:
    - macos
    - arm64
  needs: ["build:macos-arm64"]

# ----- Linux x86_64 -----

build:linux-x86_64:
  extends: .build-template
  needs: ["compile:materials"]
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq cmake ninja-build clang libc++-dev libc++abi-dev python3 libgl-dev libvulkan-dev > /dev/null
  variables:
    CC: clang
    CXX: clang++
    CXXFLAGS: "-stdlib=libc++"
  cache:
    key: filament-linux-${FILAMENT_VERSION}
    paths:
      - external/filament/

test:linux-x86_64:
  extends: .test-template
  image: ubuntu:22.04
  needs: ["build:linux-x86_64"]
  before_script:
    - apt-get update -qq && apt-get install -y -qq cmake libc++1 libvulkan1 mesa-vulkan-drivers > /dev/null
    - export LD_LIBRARY_PATH="$PWD/build/Release/bin:$LD_LIBRARY_PATH"

# ----- Linux arm64 -----

build:linux-arm64:
  extends: .build-template
  needs: ["compile:materials"]
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq cmake ninja-build clang libc++-dev libc++abi-dev python3 libgl-dev libvulkan-dev > /dev/null
  variables:
    CC: clang
    CXX: clang++
    CXXFLAGS: "-stdlib=libc++"
  cache:
    key: filament-linux-arm64-${FILAMENT_VERSION}
    paths:
      - external/filament/

test:linux-arm64:
  extends: .test-template
  image: ubuntu:22.04
  needs: ["build:linux-arm64"]
  before_script:
    - apt-get update -qq && apt-get install -y -qq cmake libc++1 libvulkan1 mesa-vulkan-drivers > /dev/null
    - export LD_LIBRARY_PATH="$PWD/build/Release/bin:$LD_LIBRARY_PATH"

# ----- iOS arm64 (cross-compile on macOS) -----

build:ios-arm64:
  extends: .build-template
  needs: ["compile:materials"]
  tags:
    - macos
    - arm64
  script:
    - cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0
    - cmake --build build
  cache:
    key: filament-ios-${FILAMENT_VERSION}
    paths:
      - external/filament/

# ----- Android arm64 (cross-compile on Linux) -----

build:android-arm64:
  extends: .build-template
  needs: ["compile:materials"]
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq cmake ninja-build clang libc++-dev libc++abi-dev python3 unzip wget > /dev/null
    - |
      if [ ! -d "$PWD/android-ndk" ]; then
        wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip -O /tmp/ndk.zip
        unzip -q /tmp/ndk.zip -d /tmp/ndk
        mv /tmp/ndk/android-ndk-* "$PWD/android-ndk"
        rm /tmp/ndk.zip
      fi
  script:
    - cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=$PWD/android-ndk/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-28
    - cmake --build build
  cache:
    key: filament-android-arm64-${FILAMENT_VERSION}
    paths:
      - external/filament/
      - android-ndk/

# ----- Code coverage (macOS arm64) -----

coverage:macos-arm64:
  stage: test
  tags:
    - macos
    - arm64
  needs:
    - job: test:macos-arm64
      artifacts: false
    - arm64
  script:
    - >
      cmake -B build-cov -G Ninja
      -DCMAKE_BUILD_TYPE=Debug
      -DCMAKE_CXX_FLAGS="-fprofile-instr-generate -fcoverage-mapping"
      -DCMAKE_C_FLAGS="-fprofile-instr-generate -fcoverage-mapping"
      -DCMAKE_EXE_LINKER_FLAGS="-fprofile-instr-generate"
      -DCMAKE_SHARED_LINKER_FLAGS="-fprofile-instr-generate"
    - cmake --build build-cov
    - export LLVM_PROFILE_FILE="$PWD/build-cov/coverage-%p.profraw"
    - ctest --test-dir build-cov --output-on-failure
    - xcrun llvm-profdata merge -sparse build-cov/coverage-*.profraw -o build-cov/coverage.profdata
    - >
      xcrun llvm-cov report
      -instr-profile=build-cov/coverage.profdata
      -ignore-filename-regex='.*/(external|build-cov)/.*'
      build-cov/Debug/bin/libanari_library_filament.dylib
    - >
      xcrun llvm-cov export
      -format=lcov
      -instr-profile=build-cov/coverage.profdata
      -ignore-filename-regex='.*/(external|build-cov)/.*'
      build-cov/Debug/bin/libanari_library_filament.dylib
      > build-cov/coverage.lcov
  coverage: '/TOTAL.*(\d+\.\d+)%/'
  artifacts:
    paths:
      - build-cov/coverage.lcov
    expire_in: 1 week
  cache:
    key: filament-macos-arm64-${FILAMENT_VERSION}
    paths:
      - external/filament/
