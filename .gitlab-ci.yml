stages:
  - build
  - test

variables:
  GIT_STRATEGY: fetch
  GIT_SUBMODULE_STRATEGY: recursive
  FILAMENT_VERSION: "1.71.0"

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"

# ----- Templates -----

.build-template:
  stage: build
  script:
    - cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
    - cmake --build build
  artifacts:
    paths:
      - build/
    expire_in: 1 day

.test-template:
  stage: test
  script:
    - ctest --test-dir build --output-on-failure --output-junit Test.xml
  artifacts:
    reports:
      junit: Test.xml

# ----- Windows x86_64 (MSVC) -----

build:windows:
  extends: .build-template
  tags:
    - windows
  script:
    - '. .\scripts\vcvarsall.ps1'
    - cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
    - cmake --build build
  cache:
    key: filament-windows-${FILAMENT_VERSION}
    paths:
      - external/filament/

test:windows:
  extends: .test-template
  tags:
    - windows
  needs: ["build:windows"]

# ----- macOS arm64 -----

build:macos-arm64:
  extends: .build-template
  tags:
    - macos
    - arm64
  cache:
    key: filament-macos-arm64-${FILAMENT_VERSION}
    paths:
      - external/filament/

test:macos-arm64:
  extends: .test-template
  tags:
    - macos
    - arm64
  needs: ["build:macos-arm64"]

# ----- Linux x86_64 -----

build:linux-x86_64:
  extends: .build-template
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq cmake ninja-build clang libc++-dev libc++abi-dev python3 libgl-dev libvulkan-dev > /dev/null
  variables:
    CC: clang
    CXX: clang++
    CXXFLAGS: "-stdlib=libc++"
  cache:
    key: filament-linux-${FILAMENT_VERSION}
    paths:
      - external/filament/

test:linux-x86_64:
  extends: .test-template
  image: ubuntu:22.04
  needs: ["build:linux-x86_64"]
  before_script:
    - apt-get update -qq && apt-get install -y -qq cmake libc++1 libvulkan1 mesa-vulkan-drivers > /dev/null
    - export LD_LIBRARY_PATH="$PWD/build/external/anari-sdk:$LD_LIBRARY_PATH"

# ----- Linux arm64 -----

build:linux-arm64:
  extends: .build-template
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq cmake ninja-build clang libc++-dev libc++abi-dev python3 libgl-dev libvulkan-dev > /dev/null
  variables:
    CC: clang
    CXX: clang++
    CXXFLAGS: "-stdlib=libc++"
  cache:
    key: filament-linux-arm64-${FILAMENT_VERSION}
    paths:
      - external/filament/

test:linux-arm64:
  extends: .test-template
  image: ubuntu:22.04
  needs: ["build:linux-arm64"]
  before_script:
    - apt-get update -qq && apt-get install -y -qq cmake libc++1 libvulkan1 mesa-vulkan-drivers > /dev/null
    - export LD_LIBRARY_PATH="$PWD/build/external/anari-sdk:$LD_LIBRARY_PATH"
